    <text x="24" y="35" fill="#dce8e2" font-family="Arial, sans-serif" font-size="19" font-weight="700">Incoming dispatch alert</text>
    <text x="24" y="65" fill="#91a8a0" font-family="Arial, sans-serif" font-size="16">Driver interaction logged before impact</text>
  </g>
