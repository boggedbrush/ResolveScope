    <rect x="-26" y="-90" width="52" height="54" rx="8" fill="#27231f"/>
    <rect x="-9" y="-126" width="18" height="86" rx="5" fill="#242a27"/>
    <rect x="-50" y="28" width="16" height="92" rx="4" fill="#242a27"/>
    <rect x="34" y="28" width="16" height="92" rx="4" fill="#242a27"/>
  </g>
  <path d="M0 520 C230 482 372 502 516 592 C664 684 886 702 1200 628 L1200 760 L0 760 Z" fill="#070b0a"/>
  <rect x="118" y="574" width="964" height="102" rx="24" fill="#0b1110"/>
  <rect x="456" y="600" width="296" height="42" rx="16" fill="#151e1c"/>
  <rect x="842" y="514" width="246" height="146" rx="24" fill="#111817" stroke="#263b34" stroke-width="3"/>
  <rect x="868" y="540" width="194" height="82" rx="14" fill="#1f302b"/>
  <rect x="890" y="562" width="112" height="14" rx="7" fill="#7ef0c8"/>
  <rect x="890" y="590" width="76" height="10" rx="5" fill="#527b6d"/>
  <circle cx="1040" cy="600" r="12" fill="#7ef0c8"/>
  <circle cx="1040" cy="600" r="34" fill="#7ef0c8" opacity="0.16"/>
