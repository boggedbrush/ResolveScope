<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Dashcam tablet event still</title>
  <desc id="desc">Illustrative dashcam-style evidence frame showing a dock approach, in-cab tablet alert, speed, and seconds before impact.</desc>
  <defs>
    <linearGradient id="cab" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#111817"/>
      <stop offset="1" stop-color="#050807"/>
    </linearGradient>
    <linearGradient id="dock" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#9daaa5"/>
      <stop offset="1" stop-color="#36413e"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="760" fill="url(#cab)"/>
  <path d="M126 118 H1074 L990 568 H210 Z" fill="url(#dock)"/>
  <path d="M180 210 H1016 L942 548 H262 Z" fill="#1c2825" opacity="0.36"/>
