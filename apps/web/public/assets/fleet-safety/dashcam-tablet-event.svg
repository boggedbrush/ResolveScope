  <rect x="638" y="164" width="114" height="142" rx="5" fill="#465a54"/>
  <rect x="652" y="104" width="86" height="30" rx="6" fill="#111817"/>
  <text x="695" y="125" fill="#dbe8e1" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700">BAY 4</text>
  <path d="M260 568 L512 340 L696 340 L940 568 Z" fill="#202d2a"/>
  <path d="M352 568 C426 470 502 414 612 374" fill="none" stroke="#8fe8c7" stroke-width="10" stroke-linecap="round" stroke-dasharray="26 20"/>
  <g transform="translate(800 368) rotate(-8)">
