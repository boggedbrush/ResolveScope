    <text x="22" y="33" fill="#dce8e2" font-family="Arial, sans-serif" font-size="18" font-weight="700">Dashcam metadata</text>
    <text x="22" y="62" fill="#8fe8c7" font-family="Arial, sans-serif" font-size="16">4.2 mph | tablet event T-00:08</text>
  </g>
  <g transform="translate(720 54)">
