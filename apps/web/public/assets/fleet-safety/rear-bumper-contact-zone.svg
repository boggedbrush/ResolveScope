    <path d="M112 690 L1120 610" stroke="#d8e2dc" stroke-width="8" stroke-linecap="round" opacity="0.5"/>
  </g>
  <g filter="url(#shadow)">
    <path d="M236 178 C240 130 275 96 326 94 L858 94 C913 94 954 134 966 190 L1010 474 C1018 532 982 582 924 590 L276 590 C224 584 190 540 198 488 Z" fill="url(#van)"/>
    <path d="M278 170 L890 170 L916 474 L252 474 Z" fill="#e9eee9"/>
    <path d="M320 204 L562 204 L562 422 L296 422 Z" fill="#5d6d70"/>
    <path d="M596 204 L838 204 L864 422 L596 422 Z" fill="#59696c"/>
    <path d="M592 180 L592 476" stroke="#b6c1bb" stroke-width="10"/>
    <rect x="278" y="474" width="656" height="76" rx="20" fill="#aeb9b3"/>
    <rect x="356" y="496" width="168" height="26" rx="9" fill="#2c3734"/>
    <rect x="656" y="496" width="168" height="26" rx="9" fill="#2c3734"/>
    <rect x="520" y="538" width="160" height="34" rx="12" fill="#313b38"/>
    <path d="M570 572 L570 612 L630 612 L630 572" fill="none" stroke="#26302d" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <g>
    <ellipse cx="634" cy="579" rx="156" ry="42" fill="#f06a4f" opacity="0.16"/>
    <ellipse cx="634" cy="579" rx="86" ry="22" fill="#f06a4f" opacity="0.22"/>
    <path d="M548 548 C590 572 655 580 724 568" fill="none" stroke="#d85a4c" stroke-width="12" stroke-linecap="round"/>
    <path d="M594 588 C620 604 654 608 690 598" fill="none" stroke="#6b4540" stroke-width="7" stroke-linecap="round"/>
