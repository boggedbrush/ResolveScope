<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Rear bumper contact evidence</title>
  <desc id="desc">Illustrative field evidence view of a white fleet van rear bumper with a highlighted hitch and scuff contact zone.</desc>
  <defs>
    <linearGradient id="sky" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#dfe8e4"/>
      <stop offset="0.58" stop-color="#c8d4ce"/>
      <stop offset="1" stop-color="#a9b8b1"/>
    </linearGradient>
    <linearGradient id="floor" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#39443f"/>
      <stop offset="1" stop-color="#202927"/>
    </linearGradient>
    <linearGradient id="van" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f4f6f0"/>
      <stop offset="1" stop-color="#cdd5cf"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#111" flood-opacity="0.32"/>
    </filter>
  </defs>
  <rect width="1200" height="760" fill="url(#sky)"/>
  <rect y="498" width="1200" height="262" fill="url(#floor)"/>
  <path d="M0 560 C170 515 320 510 490 542 C720 584 890 576 1200 518 L1200 760 L0 760 Z" fill="#26302d" opacity="0.78"/>
