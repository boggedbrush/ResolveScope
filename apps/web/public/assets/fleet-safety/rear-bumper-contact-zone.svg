    <text x="24" y="31" fill="#cfe2da" font-family="Arial, sans-serif" font-size="18" font-weight="700">Unit V-183</text>
    <text x="24" y="56" fill="#8ba29a" font-family="Arial, sans-serif" font-size="15">Rear bumper and hitch contact</text>
  </g>
