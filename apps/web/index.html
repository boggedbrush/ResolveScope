      rel="stylesheet"

    <script>
      (function () {
        var key = "resolvescope-theme";
        var stored = localStorage.getItem(key);
        var preference =
          stored === "light" || stored === "dark" || stored === "system"
            ? stored
            : "system";
        var resolved =
          preference === "system"
            ? window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light"
            : preference;
        document.documentElement.dataset.theme = resolved;
      })();
    </script>

    <noscript>
      <h1>ResolveScope : AI Case Management for Claims, Safety &amp; Inspections</h1>
      <p>ResolveScope turns scattered documents, photos, and field notes into structured, reviewable case files : with AI extraction, human-in-the-loop review, and export-ready reports.</p>
      <h2>How it works</h2>
      <p>Upload evidence. AI extracts key fields, dates, findings, and action items. Reviewers inspect and approve the structured output. Export polished PDF reports or structured JSON bundles for downstream systems.</p>
      <h2>Core capabilities</h2>
      <ul>
        <li>Case workspace with template-driven structure</li>
        <li>AI-assisted summarization and evidence extraction</li>
        <li>Structured fields with human review and approval</li>
        <li>Spatial annotation for visual and 360-degree evidence</li>
        <li>PDF and JSON export for stakeholders and downstream systems</li>
      </ul>
      <h2>Built for</h2>
      <ul>
        <li>Insurance claims and adjuster workflows</li>
        <li>Fleet safety incident review</li>
        <li>Site inspections and field observations</li>
        <li>Quality review and consumer-care triage</li>
      </ul>
    </noscript>
