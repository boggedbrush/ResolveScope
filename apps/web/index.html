      content="ResolveScope is AI-powered case management software that turns scattered evidence — documents, photos, and field notes — into structured, reviewable case files and export-ready reports."
    />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://resolvescope.pages.dev/" />
    <meta property="og:title" content="ResolveScope — AI-Powered Case Management for Claims, Safety &amp; Inspections" />
    <meta property="og:description" content="ResolveScope is AI-powered case management software that turns scattered evidence — documents, photos, and field notes — into structured, reviewable case files and export-ready reports." />
    <meta property="og:image" content="https://resolvescope.pages.dev/og-image.png" />
    <meta property="og:site_name" content="ResolveScope" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ResolveScope — AI-Powered Case Management for Claims, Safety &amp; Inspections" />
    <meta name="twitter:description" content="Turn scattered evidence into structured, reviewable case files and export-ready reports. AI extraction with human-in-the-loop review." />
    <meta name="twitter:image" content="https://resolvescope.pages.dev/og-image.png" />

    <!-- Canonical -->
    <link rel="canonical" href="https://resolvescope.pages.dev/" />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Organization",
          "@id": "https://resolvescope.pages.dev/#organization",
          "name": "ResolveScope",
          "url": "https://resolvescope.pages.dev/",
          "logo": {
            "@type": "ImageObject",
            "url": "https://resolvescope.pages.dev/logo-mark.svg"
          }
        },
        {
          "@type": "WebApplication",
          "@id": "https://resolvescope.pages.dev/#webapp",
          "name": "ResolveScope",
          "url": "https://resolvescope.pages.dev/",
          "description": "AI-powered case management software for insurance claims, fleet safety incidents, site inspections, and quality workflows. Structured evidence intake, AI extraction, human review, and export-ready reports.",
          "applicationCategory": "BusinessApplication",
          "operatingSystem": "Web",
          "offers": {
            "@type": "Offer",
            "price": "0",
            "priceCurrency": "USD"
          },
          "publisher": {
            "@id": "https://resolvescope.pages.dev/#organization"
          }
        }
      ]
    }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <script>
      (function () {
        var key = "resolvescope-theme";
        var stored = localStorage.getItem(key);
        var preference =
          stored === "light" || stored === "dark" || stored === "system"
            ? stored
            : "system";
        var resolved =
          preference === "system"
            ? window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light"
            : preference;
        document.documentElement.dataset.theme = resolved;
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <noscript>
      <h1>ResolveScope — AI-Powered Case Management</h1>
      <p>ResolveScope turns scattered evidence into structured, reviewable case files for insurance claims, fleet safety, site inspections, and quality workflows.</p>
    </noscript>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
