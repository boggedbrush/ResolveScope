<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ResolveScope — Evidence to Action</title>
    <meta
      name="description"
      content="Turn scattered documents, photos, videos, and notes into structured case files, reviewable decisions, and export-ready reports."
    />
    <meta name="theme-color" content="#FAFAF7" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <script>
      (function () {
        var key = "resolvescope-theme";
        var stored = localStorage.getItem(key);
        var preference =
          stored === "light" || stored === "dark" || stored === "system"
            ? stored
            : "system";
        var resolved =
          preference === "system"
            ? window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light"
            : preference;
        document.documentElement.dataset.theme = resolved;
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
